name: Python CI/CD Pipeline

on:
  push:
    branches: [ "main", "feature/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install system dependencies for Pygame
      run: |
        sudo apt-get update
        sudo apt-get install -y libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libfreetype6-dev libportmidi-dev libjpeg-dev python3-setuptools python3-dev
        # Встановлення віртуального дисплея для тестів
        sudo apt-get install -y xvfb

    - name: Lint with flake8
      run: |
        # Генеруємо HTML звіт про лінтінг
        mkdir -p reports/flake8
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --format=html --htmldir=reports/flake8 || true

    - name: Test with pytest
      run: |
        # Запуск тестів через xvfb-run для емуляції графіки
        mkdir -p reports/pytest
        xvfb-run pytest --html=reports/pytest/report.html --self-contained-html || true

    - name: Upload Analysis Reports
      uses: actions/upload-artifact@v4
      with:
        name: analysis-reports
        path: reports/